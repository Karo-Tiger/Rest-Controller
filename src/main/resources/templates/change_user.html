<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        /* TOP BAR */
        .topbar {
            background-color: #343a40;
            color: white;
            padding: 10px 20px;
        }

        .topbar a {
            color: white;
            text-decoration: none;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background-color: white;
            border-right: 1px solid #ddd;
            padding-top: 20px;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }

        /* BACKDROP */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        /* MODAL */
        .modal-dialog {
            max-width: 400px;
        }

        .modal-content {
            border-radius: 10px;
        }

        .modal-header {
            border-bottom: 1px solid #dee2e6;
        }

        .modal-footer {
            border-top: 1px solid #dee2e6;
        }

        /* FIXED INPUT ALIGNMENT */
        .form-control {
            text-align: center;
        }

        .form-select {
            text-align: left;
        }

        /* ROLE SELECT FIX */
        .role-select {
            height: auto;
            min-height: 90px;
        }

        .role-select option {
            padding: 8px;
        }

        .table th {
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar d-flex justify-content-between">
    <div>
        <b sec:authorize="isAuthenticated()" sec:authentication="name"></b>
        <span sec:authorize="!isAuthenticated()">guest</span>
        with roles:
        <span sec:authorize="isAuthenticated()" sec:authentication="principal.authorities"></span>
    </div>
    <div>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 sidebar">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link">User</a>
                </li>
            </ul>
        </div>

        <!-- MAIN -->
        <div class="col-10 p-4">
            <h2>Admin panel</h2>

            <!-- TABS -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link active">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link">New User</a>
                </li>
            </ul>

            <!-- TABLE -->
            <div class="card mt-3">
                <div class="card-header">
                    All users
                </div>

                <div class="card-body">
                    <table class="table table-striped text-center">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.username}"></td>
                            <td th:text="${u.email}"></td>

                            <td>
                                [16.04.2026 19:34] Mister K: <span th:each="r : ${u.roles}"
                                                                   th:text="${r.role + ' '}"></span>
                            </td>

                            <td>
                                <button class="btn btn-info btn-sm">Edit</button>
                            </td>

                            <td>
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- BACKDROP -->
<div class="backdrop"></div>

<!-- MODAL -->
<div class="modal d-block">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <a th:href="@{/admin}" class="btn-close"></a>
            </div>

            <!-- FORM -->
            <form th:action="@{/admin/update(id=${user.id})}"
                  th:object="${user}"
                  method="post">

                <!-- BODY -->
                <div class="modal-body text-center">

                    <div class="mb-3">
                        <label class="form-label fw-bold">ID</label>
                        <input type="text" th:field="*{id}" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">First name</label>
                        <input type="text" th:field="*{username}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" th:field="*{password}"
                               class="form-control"
                               placeholder="Leave empty if not changing">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Role</label>
                        <select class="form-select role-select"
                                name="roleIds"
                                multiple>

                            <option th:each="role : ${allRoles}"
                                    th:value="${role.id}"
                                    th:text="${role.role}"
                                    th:selected="${user.roles.contains(role)}">
                            </option>

                        </select>
                    </div>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <a th:href="@{/admin}" class="btn btn-secondary">Close</a>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
