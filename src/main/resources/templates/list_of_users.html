<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Управление пользователями</title>
</head>
<body>

<div>
    Вы залогинены как
    <b th:text="${#httpServletRequest.remoteUser}"></b>

    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit">Выйти</button>
    </form>
</div>

<h1>Список пользователей</h1>

<table border="1" cellpadding="5" cellspacing="0">
    <thead>
    <tr>
        <th>ID</th>
        <th>Логин</th>
        <th>Email</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>

    <tbody>
    <!-- ✅ ИСПРАВЛЕНО ЗДЕСЬ -->
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>

        <td>
            <a th:href="@{/admin/solo(id=${user.id})}"
               th:text="${user.username}"></a>
        </td>

        <td th:text="${user.email}"></td>

        <td>
            <!-- ✅ тоже немного поправил -->
            <span th:each="role : ${user.roles}"
                  th:text="${role.role + ' '}"></span>
        </td>

        <td>
            <a th:href="@{/admin/edit(id=${user.id})}">
                Редактировать
            </a>

            <form th:action="@{/admin/delete}" method="post" style="display:inline;">
                <input type="hidden" name="id" th:value="${user.id}" />
                <button type="submit"
                        onclick="return confirm('Удалить пользователя?')">
                    Удалить
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<br>

<a th:href="@{/admin/add}">Добавить нового пользователя</a>

</body>
</html>
