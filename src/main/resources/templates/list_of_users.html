<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- TOP BAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="text-white">
        <b sec:authentication="name"></b>
        with roles:
        <span sec:authentication="principal.authorities"></span>
    </span>

    <form th:action="@{/logout}" method="post">
        <button class="btn btn-link text-white">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white border-end vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-primary text-white">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">User</a>
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-10 p-4">

            <h2>Admin panel</h2>

            <!-- TABS -->
            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <button class="nav-link active"
                            data-bs-toggle="tab"
                            data-bs-target="#users">
                        Users table
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link"
                            data-bs-toggle="tab"
                            data-bs-target="#newUser">
                        New User
                    </button>
                </li>
            </ul>

            <div class="tab-content">

                <!-- USERS TABLE -->
                <div class="tab-pane fade show active" id="users">

                    <div class="card mt-3">
                        <div class="card-header">All users</div>

                        <div class="card-body">

                            <table class="table table-striped text-center">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Roles</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="u : ${users}">
                                    <td th:text="${u.id}"></td>
                                    <td th:text="${u.username}"></td>
                                    <td th:text="${u.email}"></td>

                                    <td>
                                        <span th:each="r : ${u.roles}"
                                              class="badge bg-secondary me-1"
                                              th:text="${r.role}">
                                        </span>
                                    </td>

                                    <!-- EDIT -->
                                    <td>
                                        <button class="btn btn-info btn-sm"
                                                data-bs-toggle="modal"
                                                data-bs-target="#editModal"
                                                th:attr="data-id=${u.id}, data-username=${u.username}, data-email=${u.email}">
                                            Edit
                                        </button>
                                    </td>

                                    <!-- DELETE -->
                                    <td>
                                        <button class="btn btn-danger btn-sm"
                                                data-bs-toggle="modal"
                                                data-bs-target="#deleteModal"
                                                th:attr="data-id=${u.id}">
                                            Delete
                                        </button>
                                    </td>

                                </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>

                <!-- NEW USER -->
                <div class="tab-pane fade" id="newUser">

                    <div class="card mt-3">
                        <div class="card-header text-center">
                            Add new user
                        </div>

                        <div class="card-body">

                            <form th:action="@{/admin}" method="post" th:object="${user}">

                                <input class="form-control mb-2"
                                       th:field="*{username}"
                                       placeholder="Username">

                                <input class="form-control mb-2"
                                       th:field="*{email}"
                                       placeholder="Email">

                                <input class="form-control mb-2"
                                       th:field="*{password}"
                                       placeholder="Password">

                                <select class="form-select mb-3" name="roleIds" multiple>
                                    <option th:each="role : ${allRoles}"
                                            th:value="${role.id}"
                                            th:text="${role.role}">
                                    </option>
                                </select>

                                <button class="btn btn-success w-100">
                                    Add new user
                                </button>

                            </form>

                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/admin/update}" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">

                    <input class="form-control mb-2" name="username" id="editUsername">
                    <input class="form-control mb-2" name="email" id="editEmail">
                    <input class="form-control mb-2" name="password" placeholder="Password">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-primary">Save</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- DELETE MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/admin/delete}" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Delete user</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center">
                    <input type="hidden" name="id" id="deleteId">
                    <p>Are you sure?</p>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-danger">Delete</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- MODAL SCRIPT -->
<script>
    document.getElementById('editModal').addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;

        document.getElementById('editId').value = btn.getAttribute('data-id');
        document.getElementById('editUsername').value = btn.getAttribute('data-username');
        document.getElementById('editEmail').value = btn.getAttribute('data-email');
    });

    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;
        document.getElementById('deleteId').value = btn.getAttribute('data-id');
    });
</script>

</body>
</html>
