<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Данные пользователя</title>
</head>
<body>

<div>
    Вы залогинены как <b th:text="${#httpServletRequest.remoteUser}"></b>
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit">Выйти</button>
    </form>
</div>

<h1>Данные пользователя</h1>

<p><b>ID:</b> <span th:text="${user.id}"></span></p>
<p><b>Логин:</b> <span th:text="${user.username}"></span></p>
<p><b>Email:</b> <span th:text="${user.email}"></span></p>
<p><b>Роли:</b>
    <span th:each="role : ${user.roles}" th:text="${role.role + ' '}" />
</p>

<br>

<a th:href="@{/admin}">Вернуться к списку</a>

</body>
</html>
