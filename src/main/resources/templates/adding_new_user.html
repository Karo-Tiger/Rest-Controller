<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 bg-dark text-white min-vh-100 p-3">
            <h5>Admin panel</h5>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white active">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/user}">USER</a>
                </li>
            </ul>
        </div>

        <!-- Content -->
        <div class="col-10 p-4">

            <h2>Admin panel</h2>

            <!-- Tabs -->
            <ul class="nav nav-tabs mt-4">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin}">User table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active">New User</a>
                </li>
            </ul>

            <!-- Tab content -->
            <div class="tab-content">

                <!-- New User -->
                <div class="tab-pane fade show active">

                    <div class="d-flex justify-content-center">
                        <div style="width: 400px;">

                            <div class="card mt-4">
                                <div class="card-header text-center">
                                    Add new user
                                </div>

                                <div class="card-body">

                                    <form th:action="@{/admin}" th:object="${user}" method="post">

                                        <div class="mb-3">
                                            <label class="form-label">Username</label>
                                            <input type="text" th:field="*{username}" class="form-control"/>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <input type="email" th:field="*{email}" class="form-control"/>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" th:field="*{password}" class="form-control"/>
                                        </div>
                                        <!-- Roles -->
                                        <div class="mb-3">
                                            <label class="form-label">Roles</label>
                                            <select class="form-select" name="roleIds" multiple>
                                                <option th:each="role : ${allRoles}"
                                                        th:value="${role.id}"
                                                        th:text="${role.role}">
                                                </option>
                                            </select>
                                        </div>

                                        <!-- Button -->
                                        <div class="d-grid">
                                            <button type="submit" class="btn btn-success">
                                                Add new user
                                            </button>
                                        </div>

                                    </form>

                                </div>
                            </div>

                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
